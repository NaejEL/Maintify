# SonarQube project configuration
sonar.projectKey=maintify-core
sonar.projectName=Maintify Core
sonar.projectVersion=1.0.0

# Source settings
sonar.sources=core
sonar.exclusions=**/vendor/**,**/*_test.go,**/testdata/**
sonar.tests=core
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**

# Language settings
sonar.go.coverage.reportPaths=test-results/unit-tests/coverage.out,test-results/integration-tests/coverage.out

# External analyzer reports
sonar.go.golangci-lint.reportPaths=test-results/static-analysis/golangci-lint.xml
sonar.go.golint.reportPaths=test-results/static-analysis/golint.out
sonar.go.govet.reportPaths=test-results/static-analysis/govet.out

# Quality gate settings
sonar.qualitygate.wait=true

# Security hotspots
sonar.security.hotspots.inheritance=NONE

# Duplication settings
sonar.cpd.go.minimumtokens=50

# Size metrics
sonar.size.metrics=ncloc,functions,classes,files