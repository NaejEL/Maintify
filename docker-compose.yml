services:
  builder:
    build:
      context: .
      dockerfile: builder/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - BUILDER_API_KEY=${BUILDER_API_KEY}
    volumes:
      - ./plugins:/plugins
      - /var/run/docker.sock:/var/run/docker.sock
  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-maintify}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-maintify_core}
      - AUTH_DB_URL=postgres://${DB_USER:-maintify}:${DB_PASSWORD}@db:5432/${DB_NAME:-maintify_core}?sslmode=disable
      - REDIS_URL=redis:6379
      - BUILDER_API_KEY=${BUILDER_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      builder:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./plugins:/plugins
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-maintify}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-maintify_core}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-maintify} -d ${DB_NAME:-maintify_core}"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      core:
        condition: service_healthy
    networks:
      - default
networks:
  default:
    name: maintify_default
volumes:
  pgdata:
