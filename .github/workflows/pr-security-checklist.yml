name: PR Security Checklist

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  pr-security-checklist:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate required security checklist items are checked
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            const required = [
              "I reviewed RBAC/authorization scope impact (org/tenant boundaries)",
              "I reviewed authentication/session/token impact",
              "I reviewed secret handling (no secrets committed, no insecure defaults)",
              "I reviewed input validation and SQL/injection risk",
              "I reviewed plugin isolation and sandboxing impact (if applicable)",
              "I added or updated automated tests for security-relevant behavior",
              "I verified CI security jobs are passing (dependency, secret, vuln scans)",
            ];

            const missing = required.filter((item) => {
              const escaped = item.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const re = new RegExp(`- \\[(x|X)\\]\\s*${escaped}`);
              return !re.test(body);
            });

            if (missing.length > 0) {
              core.setFailed(
                "Required security checklist items are not all checked:\n" +
                  missing.map((m) => `- ${m}`).join("\n")
              );
            }
