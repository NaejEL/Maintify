name: Go CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-ci:
    name: go-ci (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [core, builder, plugins/asset-tracker]

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build
        run: go build ./...

      - name: Test (race detector)
        run: go test -race -count=1 ./...

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: npm audit (HIGH+)
        run: npm audit --audit-level=high

  # Aggregate gate — branch protection only needs to require this one check
  ci-passed:
    name: ci-passed
    if: always()
    needs: [go-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          go_result="${{ needs.go-ci.result }}"
          fe_result="${{ needs.frontend-ci.result }}"
          failed=0

          if [[ "$go_result" != "success" ]]; then
            echo "❌ go-ci did not pass (result: $go_result)"
            failed=1
          fi

          if [[ "$fe_result" != "success" && "$fe_result" != "skipped" ]]; then
            echo "❌ frontend-ci did not pass (result: $fe_result)"
            failed=1
          fi

          if [[ "$failed" -eq 1 ]]; then
            exit 1
          fi

          echo "✅ All CI checks passed"
